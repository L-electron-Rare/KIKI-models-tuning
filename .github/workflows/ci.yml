name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate pyproject metadata
        run: |
          python - << 'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          assert "project" in data, "Missing [project] section"
          assert data["project"].get("name"), "Missing project.name"
          assert data["project"].get("version"), "Missing project.version"
          print("pyproject metadata OK")
          PY
      - name: Run tests when present
        run: |
          if [ -d tests ]; then
            python -m pip install --upgrade pip
            python -m pip install pytest
            pytest tests/ -v
          else
            echo "No tests directory detected, skipping pytest"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
